<div class="container mt-3 fade-in">
  <div class="card shadow-sm border-0">
    <div class="card-header bg-dark-bank text-white d-flex justify-content-between align-items-center p-3">
      <h4 class="mb-0">Nova Agência</h4>
      <button class="btn btn-sm btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalLista">
        Ver Agências
      </button>
    </div>
    <div class="card-body">
      <form [formGroup]="agenciaForm" (ngSubmit)="salvar()">
        <div class="row g-2">
          <div class="col-md-4 mb-3">
            <label class="fw-bold">Nome da Agência</label>
            <input type="text" class="form-control" formControlName="nome">
          </div>
          <div class="col-md-3 mb-3">
            <label class="fw-bold">Número</label>
            <input type="text" class="form-control" formControlName="numeroAgencia">
          </div>
        </div>

        <div class="row g-2">
          <div class="col-md-2 mb-3">
            <label class="fw-bold">CEP</label>
            <input type="text" class="form-control" formControlName="cep" (blur)="buscarCep()">
          </div>
          <div class="col-md-7 mb-3">
            <label class="fw-bold">Logradouro</label>
            <input type="text" class="form-control" formControlName="logradouro">
          </div>
          <div class="col-md-2 mb-3">
            <label class="fw-bold">Nº</label>
            <input type="text" class="form-control" formControlName="numero">
          </div>
          <div class="col-md-3 mb-3">
            <label class="fw-bold">Bairro</label>
            <input type="text" class="form-control" formControlName="bairro">
          </div>
          <div class="col-md-3 mb-3">
            <label class="fw-bold">Cidade</label>
            <input type="text" class="form-control" formControlName="cidade">
          </div>
          <div class="col-md-2 mb-3">
            <label class="fw-bold">Estado</label>
            <input type="text" class="form-control" formControlName="estado">
          </div>
        </div>

        <div class="d-flex justify-content-end mt-3 gap-2">
          <button type="button" class="btn btn-outline-secondary btn-sm px-4" (click)="limparFormulario()">
            <i class="bi bi-eraser me-1"></i> Limpar
          </button>
          <button type="submit" class="btn btn-primary btn-sm px-4" [disabled]="agenciaForm.invalid">
            <i class="bi bi-check-circle me-1"></i> Cadastrar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="modalLista" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content shadow-lg">

      <div class="modal-header">
        <h6 class="modal-title"><i class="bi bi-building-check me-2"></i>AGÊNCIAS CADASTRADAS</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-0">
        <div class="list-group list-group-flush">
          <div *ngFor="let ag of agencias" class="list-group-item p-3 border-bottom">
            <div class="d-flex w-100 justify-content-between align-items-center mb-2">
              <h6 class="mb-1 fw-bold text-primary">
                <i class="bi bi-building me-2"></i>{{ ag.nomeAgencia }}
              </h6>
              <span class="badge bg-dark-bank">#{{ ag.numeroAgencia }}</span>
            </div>

            <div class="row g-2 text-muted" style="font-size: 0.85rem;">
              <div class="col-12">
                <i class="bi bi-geo-alt-fill me-1 text-danger"></i>
                <strong>Logradouro:</strong> {{ ag.logradouro }}, {{ ag.numero || 'S/N' }}
              </div>
              <div class="col-md-6">
                <strong>Bairro:</strong> {{ ag.bairro }}
              </div>
              <div class="col-md-6">
                <strong>CEP:</strong> {{ ag.cep }}
              </div>
              <div class="col-12">
                <span class="loc-badge mt-1">
                  <i class="bi bi-map me-1"></i>
                  {{ ag.cidade }} / {{ ag.estado }}
                </span>
              </div>
            </div>
          </div>

          <div *ngIf="agencias.length === 0" class="p-5 text-center text-muted">
            <i class="bi bi-search fs-1 d-block mb-2"></i>
            Nenhuma agência encontrada.
          </div>
        </div>
      </div>

      <div class="modal-footer bg-light py-2">
        <button type="button" class="btn btn-secondary btn-sm px-4" data-bs-dismiss="modal">Fechar</button>
      </div>

    </div>
  </div>
</div>
